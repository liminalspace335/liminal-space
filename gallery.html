<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIMINAL SPACE — Gallery</title>
<style>
  :root{--bg:#e9e9ea;--paper:#f3f3f4;--ink:#16171a;--ink-soft:#5a5c61;--line:#cdced2;--accent:#1a1b1e;--coord:#8b8d93}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  a{color:inherit}
  .g-nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(233,233,234,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .g-logo{font-weight:800;letter-spacing:.04em;text-decoration:none;font-size:17px}
  .g-right{display:flex;align-items:center;gap:18px;font-size:12px;letter-spacing:.1em}
  .g-right a{text-decoration:none;color:var(--ink-soft)}.g-right a:hover{color:var(--ink)}
  .lang button{background:transparent;border:0;padding:6px 10px;cursor:pointer;color:var(--ink-soft);font:inherit;font-size:12px;letter-spacing:.1em;border-radius:999px}
  .lang button.active{background:var(--accent);color:#fff}
  .g-wrap{max-width:1240px;margin:0 auto;padding:54px 40px 90px}
  .g-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:30px}
  .g-head h1{font-size:clamp(28px,4vw,46px);margin:0;letter-spacing:-.01em}
  .g-head .coord{color:var(--coord);font-size:12px;letter-spacing:.18em}
  .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .gitem{position:relative;overflow:hidden;border:1px solid var(--line);aspect-ratio:3/2;background:#d2d3d6;display:block;text-decoration:none}
  .gitem img{width:100%;height:100%;object-fit:cover;filter:grayscale(.25);transition:transform .55s ease,filter .4s}
  .gitem:hover img{transform:scale(1.04);filter:grayscale(0)}
  .gitem .cap{position:absolute;left:0;right:0;bottom:0;padding:16px;background:linear-gradient(transparent,rgba(18,19,21,.82));color:#fff}
  .gcap-t{font-weight:700;font-size:14px}
  .gcap-d{font-size:12px;color:#cfd0d3;margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .g-empty{color:var(--ink-soft);padding:40px 0;text-align:center}
  footer{background:var(--accent);color:#9a9ca1;padding:30px 40px;font-size:12px;letter-spacing:.08em;text-align:center}
  @media(max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr)}.g-nav,.g-wrap{padding-left:20px;padding-right:20px}}
  @media(max-width:560px){.gallery-grid{grid-template-columns:1fr}}
  .gitem{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;z-index:210;background:rgba(10,11,12,.93);display:none;align-items:center;justify-content:center;padding:32px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:92vw;max-height:84vh;object-fit:contain;box-shadow:0 10px 60px rgba(0,0,0,.5)}
  .lightbox .lb-close{position:absolute;top:16px;right:22px;background:none;border:0;color:#fff;font-size:32px;line-height:1;cursor:pointer}
  .lightbox .lb-cap{position:absolute;left:0;right:0;bottom:22px;text-align:center;color:#cfd0d3;font-size:13px;padding:0 24px}
</style>
</head>
<body>
<header class="g-nav">
  <a class="g-logo" href="index.html">LIMINAL SPACE</a>
  <div class="g-right">
    <a href="index.html" id="homeLink">← Home</a>
    <span class="lang" id="lang"><button data-l="ko" class="active">KO</button><button data-l="en">EN</button><button data-l="vi">VI</button></span>
  </div>
</header>
<main class="g-wrap">
  <div class="g-head"><h1 id="gTitle">갤러리</h1><p class="coord mono">GALLERY</p></div>
  <div class="gallery-grid" id="grid"></div>
</main>
<footer>© <span id="yr"></span> LIMINAL SPACE — PERFUME WORKSHOP</footer>
<div class="lightbox" id="lightbox" aria-hidden="true"><button class="lb-close" type="button" aria-label="close">×</button><img alt="" /><div class="lb-cap"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="store.js"></script>
<script>
  var LANG='ko';
  function txObj(v){return (v&&typeof v==='object'&&!Array.isArray(v))?v:(v?{ko:String(v)}:{});}
  function Lval(v,l){var o=txObj(v);return o[l]||o.ko||o.en||o.vi||'';}
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  var L={ko:{title:'갤러리',home:'← 홈으로',none:'등록된 갤러리가 없습니다.'},en:{title:'Gallery',home:'← Home',none:'No gallery items yet.'},vi:{title:'Thư viện',home:'← Trang chủ',none:'Chưa có mục nào.'}};
  function placeholders(){var a=[];for(var i=1;i<=20;i++)a.push({img:'assets/gallery-'+i+'.jpg',title:{},desc:{}});return a;}
  function render(){
    var grid=document.getElementById('grid');
    var items=((window.LS?LS.getSettings():{}).gallery||[]).filter(function(g){return g&&g.img;});
    if(!items.length) items=placeholders();
    document.getElementById('gTitle').textContent=L[LANG].title;
    document.getElementById('homeLink').textContent=L[LANG].home;
    document.documentElement.lang=LANG;
    if(!items.length){ grid.innerHTML='<div class="g-empty">'+L[LANG].none+'</div>'; return; }
    grid.innerHTML=items.map(function(g){
      var t=esc(Lval(g.title,LANG)), d=esc(Lval(g.desc,LANG));
      var inner='<img src="'+esc(g.img)+'" loading="lazy" alt="'+(t||'LIMINAL SPACE')+'">'+((t||d)?('<div class="cap">'+(t?'<div class="gcap-t">'+t+'</div>':'')+(d?'<div class="gcap-d">'+d+'</div>':'')+'</div>'):'');
      return g.link?('<a class="gitem" href="'+esc(g.link)+'" target="_blank" rel="noopener">'+inner+'</a>'):('<div class="gitem">'+inner+'</div>');
    }).join('');
  }
  document.querySelectorAll('#lang button').forEach(function(b){b.addEventListener('click',function(){LANG=b.dataset.l;document.querySelectorAll('#lang button').forEach(function(x){x.classList.toggle('active',x===b);});render();});});
  document.getElementById('yr').textContent=new Date().getFullYear();
  // 라이트박스
  (function(){var lb=document.getElementById('lightbox');if(!lb)return;var im=lb.querySelector('img'),cap=lb.querySelector('.lb-cap');
    document.addEventListener('click',function(e){var hit=e.target.closest('#grid .gitem');if(!hit||hit.tagName==='A')return;var img=hit.querySelector('img');if(!img)return;var t=hit.querySelector('.gcap-t');e.preventDefault();im.src=img.currentSrc||img.src;cap.textContent=t?t.textContent:'';lb.classList.add('open');document.body.style.overflow='hidden';});
    function c(){lb.classList.remove('open');document.body.style.overflow='';im.removeAttribute('src');}
    lb.addEventListener('click',function(e){if(e.target===lb||e.target.classList.contains('lb-close'))c();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&lb.classList.contains('open'))c();});})();
  (window.LS?LS.init():Promise.resolve()).then(render);
</script>
</body>
</html>
